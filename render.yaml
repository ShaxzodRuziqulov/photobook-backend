services:
  - type: web
    name: photobook-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: JPA_DDL_AUTO
        value: "update"
      - key: JPA_SHOW_SQL
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_URL
        fromDatabase:
          name: photobook-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: photobook-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: photobook-db
          property: password

databases:
  - name: photobook-db
    plan: free
