server:
  port: ${PORT:8091}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/photobook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
security:
  jwt:
    secret-key: ${SECRET_KEY:f72456084250dd5fa5b18eafffe4cdc1dbdcb36fa0e3608eb85d13b67705ce44}
    expiration-time: 86400000
    refresh-expiration-time: 604800000

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
  upload:
    dir: ${APP_UPLOAD_DIR:uploads-storage}
